name: vsx semantic-release

# Semantic-release entry for the VS Code Extension line (Marketplace + Open VSX).
# Sibling of npm-semantic-release.yml (which handles the npm packages).
# Filename uses the `vsx-` prefix (vendor-neutral over VS Code Marketplace + Open VSX).

on:
  push:
    branches: [beta, production]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Preview job runs semantic-release --dry-run without an environment gate,
  # so reviewers of the downstream release job can inspect what the approval
  # will actually produce (tag name, version, channel, or "no release" reason)
  # via the workflow's Job Summary before clicking Approve.
  #
  # Preview runs unconstrained (no concurrency group) so it fires immediately
  # even while a sibling workflow's release job is pending approval — that is
  # this workflow's headline design goal.
  preview:
    # Skip preview when the push is semantic-release's own release commit ([skip release]).
    # On workflow_dispatch, github.event.head_commit is unset — the condition below evaluates
    # to true (allow) so manual dispatch is never blocked.
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      will-release: ${{ steps.parse.outputs.will-release }}
      next-version: ${{ steps.parse.outputs.next-version }}
      next-tag: ${{ steps.parse.outputs.next-tag }}
      channel: ${{ steps.parse.outputs.channel }}
      reason: ${{ steps.parse.outputs.reason }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install semantic-release + plugins
        run: |
          npm install --no-save \
            semantic-release@^24 \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            @semantic-release/npm \
            @semantic-release/git \
            @semantic-release/github

      - name: Run semantic-release --dry-run
        # semantic-release's verifyConditions step runs `git push --dry-run` against the release
        # branch even in --dry-run mode (empirically verified 2026-07-19: post-PR #201 workflow
        # runs 29687650391/29687973400 both failed with "Permission denied to github-actions[bot]"
        # on that dry-push). github.token cannot push to protected branches, so the preview job
        # requires the same PAT the release job uses. Copilot's PAT-hardening suggestion for
        # --dry-run turned out to be theoretically sound but empirically incorrect for this tool.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
        run: |
          set -o pipefail
          npx semantic-release --dry-run 2>&1 | tee dry-run.log
          # exit 0 even if no release — dry-run reports no-release as info, not error

      - name: Parse preview + write Job Summary
        id: parse
        # pipefail must be re-armed here — each step runs in a fresh shell, so the
        # earlier step's pipefail setting does not carry over. Without it, a grep|head
        # pipeline reports head's (always-zero) exit status and the || fallback never
        # triggers on regex mismatch, silently emptying REASON.
        shell: bash
        run: |
          set -o pipefail
          LOG=dry-run.log
          # semantic-release logs "The next release version is X.Y.Z" when it would release
          NEXT_VER=$(grep -oE 'next release version is [^ ]+' "$LOG" | awk '{print $NF}' | head -1 || true)
          if [ -n "$NEXT_VER" ]; then
            WILL_RELEASE=true
            # In --dry-run, semantic-release logs "Skip <tag> tag creation in dry-run mode"
            # (never "Created tag"). Parse the Skip line for the tagFormat-resolved tag —
            # this is the only reliable source and matches the actual publish tag.
            NEXT_TAG=$(grep -oE 'Skip [^ ]+ tag creation in dry-run mode' "$LOG" | awk '{print $2}' | head -1 || true)
            if [ -z "$NEXT_TAG" ]; then
              # Fallback: semantic-release output format may change in future versions —
              # try the "Created tag" line (non-dry-run wording). If both fail, leave the
              # tag empty rather than fabricating a wrong tagFormat manually.
              NEXT_TAG=$(grep -oE 'Created tag [^ ]+' "$LOG" | awk '{print $NF}' | head -1 || true)
            fi
            # channel is the branch's channel from releaserc — infer from tag suffix
            case "$NEXT_TAG" in
              *-next.*) CHANNEL=next ;;
              *-beta.*) CHANNEL=beta ;;
              *) CHANNEL=latest ;;
            esac
            REASON=""
          else
            WILL_RELEASE=false
            NEXT_TAG=""
            CHANNEL=""
            if REASON_MATCH=$(grep -oE 'There are no relevant changes[^,]*' "$LOG" | head -1); then
              REASON="$REASON_MATCH"
            else
              REASON="no matching commits since baseline"
            fi
          fi
          {
            echo "next-version=$NEXT_VER"
            echo "next-tag=$NEXT_TAG"
            echo "channel=$CHANNEL"
            echo "will-release=$WILL_RELEASE"
            echo "reason=$REASON"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## vsx-semantic-release preview"
            echo
            echo "**Branch**: \`${GITHUB_REF#refs/heads/}\`"
            if [ "$WILL_RELEASE" = "true" ]; then
              echo "**Will release**: ✅"
              echo "**Version**: \`$NEXT_VER\`"
              echo "**Tag**: \`${NEXT_TAG:-(unresolved — see dry-run log)}\`"
              echo "**Channel**: \`$CHANNEL\`"
            else
              echo "**Will release**: ❌ no release"
              echo "**Reason**: $REASON"
            fi
            echo
            echo "<details><summary>Full dry-run log</summary>"
            echo
            echo '```text'
            cat "$LOG"
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    needs: preview
    # Skip release on semantic-release's own release commit ([skip release]) — mirrors
    # the preview job's guard so the whole workflow no-ops on release-commit pushes.
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    # Concurrency is scoped to the release job only (not the workflow) so the preview job
    # runs unconstrained. Sibling workflows (npm-semantic-release.yml) sharing the same
    # group serialize their release jobs (which push commits + tags back to the source
    # branch), preventing non-fast-forward push failures on same-ref races.
    concurrency:
      group: semantic-release-${{ github.ref }}
      cancel-in-progress: false
    # Environment per channel: production (stable) needs manual reviewer approval,
    # beta (pre-release) uses a separate "beta-vscode" environment
    # so pre-release publishes are auditable without gating them behind stable-tier reviewers.
    # Preview job's Job Summary shows what this approval will produce (tag/version/channel).
    environment: ${{ github.ref == 'refs/heads/production' && 'production-vscode' || 'beta-vscode' }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Explicit ref pin so serialized workflows check out the current branch tip at
          # execution time — not the trigger SHA (default). Without this, the second-serialized
          # workflow computes its release against the pre-push SHA and its git push fails
          # non-fast-forward because the first workflow already advanced the branch.
          ref: ${{ github.ref }}
          fetch-depth: 0
          # PAT is required here so the semantic-release commit + tag push triggers the
          # downstream release-vscode.yml workflow (github.token pushes do not trigger
          # other workflows in the same repo).
          token: ${{ secrets.RELEASE_PLEASE_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          # Keep aligned with release-vscode.yml so semantic-release runs on the same Node runtime.
          node-version: '24'

      - name: Setup pnpm
        # Required so @semantic-release/exec's prepareCmd can run `pnpm install --lockfile-only`.
        uses: pnpm/action-setup@v6

      - name: Install semantic-release + plugins
        run: |
          npm install --no-save \
            semantic-release@^24 \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            @semantic-release/npm \
            @semantic-release/git \
            @semantic-release/github

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
        run: npx semantic-release
