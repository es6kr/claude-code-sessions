name: release-please (beta)

on:
  push:
    branches: [beta]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-beta-config.json
          manifest-file: .release-please-manifest-beta.json
          target-branch: beta
