name: npm semantic-release

# Versioning strategy: two channels — production (stable, dist-tag latest) + main (channel next, dist-tag next).
# - Baseline: highest matching git tag for tagFormat `v${version}` per channel (excluding vscode-v tags).
# - Commit-analyzer scope filter (.releaserc-npm.json) blocks `(vscode)`-scoped commits so vscode-only work does NOT bump npm packages.
# - Tag push (`v[0-9]*`) triggers downstream publish-npm.yml which discriminates -next.N tags → npm dist-tag next; plain tags → latest.

on:
  push: { branches: [beta, production] }
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Preview job runs semantic-release --dry-run (with npm config swapped in) without
  # an environment gate, so reviewers can inspect the upcoming tag/version/channel
  # or the "no release" reason in the Job Summary before approving the release job.
  #
  # Preview runs unconstrained (no concurrency group) so it fires immediately
  # even while a sibling workflow's release job is pending approval.
  preview:
    # Same loop-prevention guard as release — no need to preview a [skip release] commit.
    # `github.event.head_commit` is unset on workflow_dispatch, so gate on event_name
    # first so manual dispatch is never blocked by the missing field.
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      will-release: ${{ steps.parse.outputs.will-release }}
      next-version: ${{ steps.parse.outputs.next-version }}
      next-tag: ${{ steps.parse.outputs.next-tag }}
      channel: ${{ steps.parse.outputs.channel }}
      reason: ${{ steps.parse.outputs.reason }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install semantic-release + plugins
        run: |
          npm install --no-save \
            semantic-release@^24 \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github

      - name: Run semantic-release --dry-run (npm config)
        # semantic-release's verifyConditions runs `git push --dry-run` against the release
        # branch even in --dry-run mode (empirically verified 2026-07-19: post-PR #201 workflow
        # runs 29687650382/29687973* both failed with "Permission denied to github-actions[bot]"
        # on that dry-push). github.token cannot push to protected branches, so the preview job
        # requires the same PAT the release job uses. Copilot's PAT-hardening suggestion for
        # --dry-run turned out to be theoretically sound but empirically incorrect for this tool.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
        run: |
          set -o pipefail
          cp .releaserc-npm.json .releaserc.json
          npx semantic-release --dry-run 2>&1 | tee dry-run.log

      - name: Parse preview + write Job Summary
        id: parse
        # pipefail must be re-armed here — each step runs in a fresh shell, so the earlier
        # step's pipefail setting does not carry over. Without it, `grep | head -1` reports
        # head's (always-zero) exit status and the || fallback never triggers, silently
        # emptying REASON on regex mismatch.
        shell: bash
        run: |
          set -o pipefail
          LOG=dry-run.log
          NEXT_VER=$(grep -oE 'next release version is [^ ]+' "$LOG" | awk '{print $NF}' | head -1 || true)
          if [ -n "$NEXT_VER" ]; then
            WILL_RELEASE=true
            # In --dry-run, semantic-release logs "Skip <tag> tag creation in dry-run mode"
            # (never "Created tag"). Parse the Skip line for the tagFormat-resolved tag —
            # this is the only reliable source and matches the actual publish tag.
            NEXT_TAG=$(grep -oE 'Skip [^ ]+ tag creation in dry-run mode' "$LOG" | awk '{print $2}' | head -1 || true)
            if [ -z "$NEXT_TAG" ]; then
              # Fallback: semantic-release output format may change in future versions —
              # try the "Created tag" line (non-dry-run wording). Leaving the tag empty
              # is preferable to fabricating a wrong tagFormat manually.
              NEXT_TAG=$(grep -oE 'Created tag [^ ]+' "$LOG" | awk '{print $NF}' | head -1 || true)
            fi
            case "$NEXT_TAG" in
              *-next.*) CHANNEL=next ;;
              *-beta.*) CHANNEL=beta ;;
              *) CHANNEL=latest ;;
            esac
            REASON=""
          else
            WILL_RELEASE=false
            NEXT_TAG=""
            CHANNEL=""
            if REASON_MATCH=$(grep -oE 'There are no relevant changes[^,]*' "$LOG" | head -1); then
              REASON="$REASON_MATCH"
            else
              REASON="no matching commits since baseline"
            fi
          fi
          {
            echo "next-version=$NEXT_VER"
            echo "next-tag=$NEXT_TAG"
            echo "channel=$CHANNEL"
            echo "will-release=$WILL_RELEASE"
            echo "reason=$REASON"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## npm-semantic-release preview"
            echo
            echo "**Branch**: \`${GITHUB_REF#refs/heads/}\`"
            if [ "$WILL_RELEASE" = "true" ]; then
              echo "**Will release**: ✅"
              echo "**Version**: \`$NEXT_VER\`"
              echo "**Tag**: \`${NEXT_TAG:-(unresolved — see dry-run log)}\`"
              echo "**npm dist-tag / channel**: \`$CHANNEL\`"
            else
              echo "**Will release**: ❌ no release"
              echo "**Reason**: $REASON"
            fi
            echo
            echo "<details><summary>Full dry-run log</summary>"
            echo
            echo '```text'
            cat "$LOG"
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    needs: preview
    # Skip release on the commit semantic-release itself pushed back (loop prevention).
    # `[skip release]` is a project-narrow signal — does NOT block CI / e2e / dependabot workflows.
    # Gate on event_name first so workflow_dispatch (where head_commit is unset) is never blocked.
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    # Concurrency is scoped to the release job only (not the workflow) so the preview job
    # runs unconstrained. Sibling workflows (vsx-semantic-release.yml) sharing the same
    # group serialize their release jobs (which push commits + tags back to the source
    # branch), preventing non-fast-forward push failures on same-ref races.
    concurrency:
      group: semantic-release-${{ github.ref }}
      cancel-in-progress: false
    # Environment per channel: production (stable, dist-tag latest) needs manual reviewer approval,
    # main (channel:next pre-release, dist-tag next) uses a separate "next-npm" environment
    # so pre-release publishes are auditable without gating them behind stable-tier reviewers.
    # Preview job's Job Summary shows what this approval will produce (tag/version/channel).
    environment: ${{ github.ref == 'refs/heads/production' && 'production-npm' || 'beta-npm' }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Explicit ref pin so serialized workflows check out the current branch tip at
          # execution time — not the trigger SHA (default). Without this, the second-serialized
          # workflow computes its release against the pre-push SHA and its git push fails
          # non-fast-forward because the first workflow already advanced the branch.
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_PAT }} # PAT enables downstream publish-npm.yml trigger on tag push

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24' # consistent with vsx-semantic-release.yml + release-vscode.yml

      - name: Setup pnpm
        uses: pnpm/action-setup@v6 # needed by @semantic-release/exec prepareCmd (pnpm version + pnpm install --lockfile-only)

      - name: Install semantic-release + plugins
        run: |
          npm install --no-save \
            semantic-release@^24 \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github

      - name: Run semantic-release (npm config)
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
        # semantic-release auto-discovers .releaserc.json (the vscode config) as the base and merges
        # `--extends` UNDER it, so `--extends ./.releaserc-npm.json` was fully shadowed (base kept the
        # vscode tagFormat + plugins → npm never released). Overwrite the auto-discovered config with
        # the npm config for this job so it becomes the effective base. Not committed: the git plugin
        # only stages the configured assets, so this working-tree change is discarded with the runner.
        run: |
          cp .releaserc-npm.json .releaserc.json
          npx semantic-release
