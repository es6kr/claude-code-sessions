name: release-please (vscode-extension beta)

on:
  push:
    branches: [ovsx-beta]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please-vscode-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin major.minor.patch base — never let conventional commits bump it.
      # Beta/ovsx-beta policy: only the -beta.N prerelease counter increments.
      - name: Compute next beta version (counter+1, base UNCHANGED)
        id: compute
        run: |
          set -euo pipefail
          CURRENT=$(jq -r '."packages/vscode-extension"' .release-please-manifest-vscode-beta.json)
          BASE=$(echo "$CURRENT" | sed -E 's/-beta\.[0-9]+$//')
          COUNTER=$(echo "$CURRENT" | grep -oE 'beta\.[0-9]+$' | grep -oE '[0-9]+$')
          NEXT_COUNTER=$((COUNTER + 1))
          NEXT="${BASE}-beta.${NEXT_COUNTER}"
          echo "Current manifest version: $CURRENT"
          echo "Pinned base:              $BASE"
          echo "Next pinned version:      $NEXT"
          echo "next-version=$NEXT" >> "$GITHUB_OUTPUT"

      # Documented override path is the config-file's per-package `release-as`
      # field (release-please manifest-releaser docs). Patch it in-place so
      # release-please reads it as the authoritative next version.
      #
      # We also align package.json `version` so release-please's "updating
      # from X to Y" derivation starts from the pinned base (X), preventing
      # any residual minor/patch bumps from sneaking in.
      - name: Inject release-as into config-file and package.json
        run: |
          set -euo pipefail
          NEXT="${{ steps.compute.outputs.next-version }}"

          # Patch config file: add release-as to packages/vscode-extension
          jq --arg ver "$NEXT" \
            '.packages["packages/vscode-extension"]["release-as"] = $ver' \
            release-please-vscode-beta-config.json > /tmp/config.json
          mv /tmp/config.json release-please-vscode-beta-config.json
          echo "Patched config-file:"
          cat release-please-vscode-beta-config.json

          # Patch package.json version to the pinned next version so the
          # action's internal "updating from X to Y" starts from X = next.
          jq --arg ver "$NEXT" '.version = $ver' \
            packages/vscode-extension/package.json > /tmp/pkg.json
          mv /tmp/pkg.json packages/vscode-extension/package.json
          echo "Patched packages/vscode-extension/package.json version: $(jq -r .version packages/vscode-extension/package.json)"

      # PAT (not GITHUB_TOKEN) is required so that tag/commit pushes from
      # release-please trigger downstream workflows (e.g. release-vscode on
      # `vscode-v*` tag push). GitHub does not trigger workflows when a tag
      # is pushed with GITHUB_TOKEN (infinite-loop protection).
      #
      # skip-github-release: true delegates GitHub Release creation to the
      # release-vscode workflow on tag push, preventing duplicate releases
      # that would otherwise collide with action-gh-release (HTTP 422
      # already_exists on finalize). Verified 2026-06-07 with vscode-v0.4.9-beta.4.
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-vscode-beta-config.json
          manifest-file: .release-please-manifest-vscode-beta.json
          target-branch: ovsx-beta
          skip-github-release: true
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
